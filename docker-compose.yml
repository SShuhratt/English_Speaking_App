name: edtech-backend-engine

services:

  postgres:
    image: postgres:17
    container_name: edtech-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: edtech
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgress
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - edtech
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d edtech"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: edtech-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - edtech
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edtech-laravel-octane
    restart: unless-stopped
    ports:
      - "8080:8000"
    volumes:
      - ./:/app
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      OCTANE_SERVER: frankenphp
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: edtech
      DB_USERNAME: postgres
      DB_PASSWORD: postgress
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CLIENT: predis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - edtech

  horizon:
    # Reuses the exact same built container image from the api layer instantly
    image: edtech-backend-engine-api:latest
    container_name: edtech-horizon
    restart: unless-stopped
    command: php artisan horizon
    volumes:
      - ./:/app
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: edtech
      DB_USERNAME: postgres
      DB_PASSWORD: postgress
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CLIENT: predis
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - edtech

networks:
  edtech:
    driver: bridge

volumes:
  postgres_data:
  redis_data: